name: CI

on:
  pull_request:

jobs:
  test-bun:
    name: Test (Bun)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Build GitHub Actions
        run: bun run build:actions

      - name: Verify built actions
        run: |
          test -f .github/actions/collect-metrics/dist/collect.js
          test -f .github/actions/find-database/dist/find-database.js
          test -f .github/actions/generate-report/dist/report.js
          echo "✓ All action bundles verified"
